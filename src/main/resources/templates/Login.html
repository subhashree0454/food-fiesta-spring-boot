<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | Food Fiesta</title>
	<link rel="stylesheet" th:href="@{/css/main.css}" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
	<style>
		.login-wrapper {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 120px 5%;
			background: radial-gradient(circle at top left, #fff1eb, transparent),
						radial-gradient(circle at bottom right, #f8f9fa, transparent);
		}
		.login-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 40px;
			max-width: 1000px;
			width: 100%;
		}
		.login-card {
			background: white;
			padding: 40px;
			border-radius: 24px;
			box-shadow: 0 10px 30px rgba(0,0,0,0.05);
			border: 1px solid var(--outline-variant);
		}
		.badge {
			display: inline-block;
			padding: 4px 12px;
			background: var(--surface-container-low);
			border-radius: 50px;
			font-size: 0.75rem;
			font-weight: 700;
			text-transform: uppercase;
			color: var(--primary);
			margin-bottom: 15px;
		}
		@media (max-width: 768px) {
			.login-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<nav th:replace="~{Navigation::navbar()}"></nav>

	<div class="login-wrapper">
		<div class="login-grid">
			<!-- Admin Login -->
			<div class="login-card animate-up">
				<span class="badge">Business</span>
				<h2>Admin <span style="color: var(--primary);">Portal</span></h2>
				<p style="color: var(--on-surface-variant); margin-bottom: 30px;">Manage inventory and orders efficiently.</p>

				<form th:action="@{/adminLogin}" method="post">
					<div class="form-group">
						<label class="form-label">Email Address</label>
						<input type="email" name="email" placeholder="admin@foodfiesta.com" class="form-input" required>
					</div>
					<div class="form-group">
						<label class="form-label">Password</label>
						<input type="password" name="password" placeholder="••••••••" class="form-input" required>
					</div>
					<small style="color: var(--primary); display: block; margin-bottom: 15px;" th:text="${error}"></small>
					<button type="submit" class="btn-primary" style="width: 100%;">Access Admin Dashboard</button>
				</form>
			</div>

			<!-- User Login -->
			<div class="login-card animate-up" style="animation-delay: 0.2s;">
				<span class="badge">Customer</span>
				<h2>Order <span style="color: var(--primary);">Now</span></h2>
				<p style="color: var(--on-surface-variant); margin-bottom: 30px;">Log in to track your orders and favorites.</p>

				<form th:action="@{/userLogin}" method="post">
					<div class="form-group">
						<label class="form-label">Email Address</label>
						<input type="email" name="userEmail" placeholder="your@email.com" class="form-input" required>
					</div>
					<div class="form-group">
						<label class="form-label">Password</label>
						<input type="password" name="userPassword" placeholder="••••••••" class="form-input" required>
					</div>
					<small style="color: var(--primary); display: block; margin-bottom: 15px;" th:text="${error2}"></small>
					<button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
				</form>
				<p style="margin-top: 25px; text-align: center; color: var(--on-surface-variant);">
					New to Food Fiesta? <a th:href="@{/register}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create Account</a>
				</p>
			</div>
		</div>
	</div>

	<footer style="padding: 40px 5%; text-align: center; color: var(--on-surface-variant); font-size: 0.9rem;">
		&copy; 2024 Food Fiesta. Secure & Encrypted Gateway.
	</footer>
</body>
</html>
