<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Us | Food Fiesta</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        .locate-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 160px 5% 100px;
        }
        .map-wrapper {
            width: 100%;
            height: 500px;
            background: var(--surface-container-low);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--outline-variant);
            margin-top: 40px;
            position: relative;
        }
        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="locate-container">
        <div class="animate-up" style="text-align: center;">
            <span style="color: var(--primary); font-weight: 700;">VISIT US</span>
            <h1 style="font-size: 3.5rem; margin-top: 10px;">Find your nearest <span style="color: var(--primary);">Fiesta</span>.</h1>
            <p style="color: var(--on-surface-variant);">We are located in the heart of the city, ready to serve you.</p>
        </div>

        <div class="map-wrapper animate-up" style="animation-delay: 0.2s;">
            <!-- Placeholder for Map -->
            <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1200'); background-size: cover;">
                <i class="fa-solid fa-location-dot" style="font-size: 4rem; color: var(--primary);"></i>
                <h2 style="margin-top: 20px;">Main Branch: Downtown Street 12</h2>
                <p>New Delhi, India</p>
            </div>
        </div>

        <div class="contact-info">
            <div class="card animate-up" style="animation-delay: 0.3s;">
                <i class="fa-solid fa-phone" style="color: var(--primary); margin-bottom: 15px;"></i>
                <h3>Call Us</h3>
                <p style="color: var(--on-surface-variant);">+91 98765 43210</p>
            </div>
            <div class="card animate-up" style="animation-delay: 0.4s;">
                <i class="fa-solid fa-envelope" style="color: var(--primary); margin-bottom: 15px;"></i>
                <h3>Email</h3>
                <p style="color: var(--on-surface-variant);">hello@foodfiesta.com</p>
            </div>
            <div class="card animate-up" style="animation-delay: 0.5s;">
                <i class="fa-solid fa-clock" style="color: var(--primary); margin-bottom: 15px;"></i>
                <h3>Open Hours</h3>
                <p style="color: var(--on-surface-variant);">Daily: 10 AM - 11 PM</p>
            </div>
        </div>
    </div>
</body>
</html>
